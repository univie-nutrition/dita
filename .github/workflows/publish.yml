name: Publish to GitHub Pages
on:
  push:
    branches: [main]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
concurrency:
  group: github-pages
  cancel-in-progress: false
# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      
    - name: Configure Pages
      uses: actions/configure-pages@v6
      
    - name: Install Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        
    - name: Install Antora
      run: npm i antora asciidoctor-kroki
      
    - name: Check Kroki
      run: |
        # set URL to your Kroki endpoint; change if using env var or self-hosted
        KROKI_URL=${{ env.KROKI_URL || 'https://kroki.io' }}
        echo "Checking $KROKI_URL ..."
        # Try a small, valid PlantUML render to verify service is up
        STATUS=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 10 \
          -H "Content-Type: text/plain" \
          --data-binary $'@startuml\nAlice -> Bob: hi\n@enduml' \
          "$KROKI_URL/plantuml/svg")
        if [ "$STATUS" != "200" ]; then
          echo "::error::Kroki check failed (HTTP $STATUS) — skipping site build."
          exit 1
        fi
        echo "Kroki is reachable (HTTP $STATUS)."
      
    - name: Generate Site
      run: npx antora antora-playbook.yml
      
    - name: Upload Artifacts
      uses: actions/upload-pages-artifact@v5
      with:
        path: build/site
        
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v5