name: Publish to GitHub Pages
on:
  push:
    branches: [main]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
concurrency:
  group: github-pages
  cancel-in-progress: false
# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      
    - name: Configure Pages
      uses: actions/configure-pages@v6
      
    - name: Install Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        
    - name: Install Antora
      run: npm i antora asciidoctor-kroki
      
    - name: Start Kroki
      uses: docker://plantuml/kroki:latest
      with:
        args: -d -p 8000:8000
    - name: Wait for Kroki
      run: |
        until curl -sSf http://localhost:8000/plantuml/svg >/dev/null 2>&1; do sleep 1; done
    - name: Set KROKI_URL
      run: echo "KROKI_URL=http://localhost:8000" >> $GITHUB_ENV
              
    - name: Check Kroki
      run: |
        KROKI_URL=${{ env.KROKI_URL || 'https://kroki.io' }}
        echo "Checking $KROKI_URL ..."
        BODY='@startuml\nAlice -> Bob: hi\n@enduml'
        STATUS=$(printf "%b" "$BODY" | curl -sS -o /dev/null -w '%{http_code}' --max-time 10 \
          -H "Content-Type: text/plain" --data-binary @- "$KROKI_URL/plantuml/svg")
        if [ "$STATUS" != "200" ]; then
          echo "::error::Kroki check failed (HTTP $STATUS) — skipping site build."
          exit 1
        fi
        echo "Kroki is reachable (HTTP $STATUS)."
      
    - name: Generate Site
      run: npx antora antora-playbook.yml
      
    - name: Upload Artifacts
      uses: actions/upload-pages-artifact@v5
      with:
        path: build/site
        
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v5